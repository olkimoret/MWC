<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Review Linker</title>
<style>
  :root {
    --brand:        #C0392B;
    --brand-dark:   #96281B;
    --brand-bg:     rgba(192,57,43,0.08);
    --text:         #1C1C1E;
    --text-2:       #6C6C70;
    --text-3:       #8E8E93;
    --sep:          rgba(60,60,67,0.18);
    --sep-opaque:   #D1D1D6;
    --bg:           #F2F2F7;
    --surface:      #FFFFFF;
    --radius:       12px;
    --radius-sm:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: #a10000;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: none;
  }

  .header-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.2px;
  }

  .header-text p {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.70);
    margin-top: 1px;
  }

  /* ── CONTAINER ── */
  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ── STEPS ── */
  .step { display: none; animation: fadeIn 0.25s ease; }
  .step.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PROGRESS ── */
  .progress {
    display: flex;
    gap: 5px;
    margin-bottom: 24px;
  }

  .progress-dot {
    flex: 1;
    height: 3px;
    background: var(--sep-opaque);
    border-radius: 2px;
    transition: background 0.3s;
  }

  .progress-dot.done { background: var(--brand); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 20px 4px 8px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .card-title { display: none; }

  /* ── FORM ROWS ── */
  .form-row {
    display: flex;
    align-items: center;
    min-height: 44px;
    padding: 11px 16px;
    gap: 10px;
    border-bottom: 0.5px solid var(--sep);
  }

  .form-row:last-child { border-bottom: none; }

  .form-row .row-label {
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    flex-shrink: 0;
  }

  .form-row .row-label small {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 400;
  }

  /* ── STANDALONE FIELD ── */
  .field-block {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--sep);
  }

  .field-block:last-child { border-bottom: none; }

  .field-block label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-3);
    margin-bottom: 5px;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ── SELECT ── */
  .select-wrapper { position: relative; }

  .select-wrapper select {
    width: 100%;
    padding: 0;
    padding-right: 24px;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    cursor: pointer;
  }

  .select-wrapper::after {
    content: '';
    position: absolute;
    right: 2px;
    top: 50%;
    width: 7px;
    height: 7px;
    border-right: 1.5px solid var(--text-3);
    border-bottom: 1.5px solid var(--text-3);
    transform: translateY(-65%) rotate(45deg);
    pointer-events: none;
  }

  /* ── DATE / TIME ── */
  input[type="time"],
  input[type="date"] {
    flex: 1;
    text-align: right;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    color: var(--brand);
    border: none;
    background: transparent;
    padding: 0;
    outline: none;
    cursor: pointer;
    min-width: 0;
  }

  .date-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 3px;
  }

  /* ── TEXT INPUT / TEXTAREA ── */
  input[type="text"] {
    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 16px;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    padding: 0;
  }

  textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 88px;
    padding: 14px 16px;
    line-height: 1.5;
    display: block;
  }

  textarea::placeholder { color: var(--text-3); }

  /* ── TOGGLE ── */
  .toggle-field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    min-height: 44px;
    border-bottom: 0.5px solid var(--sep);
  }

  .toggle-field:last-child { border-bottom: none; }

  .toggle-label { font-size: 16px; font-weight: 400; color: var(--text); }
  .toggle-sub { font-size: 13px; color: var(--text-2); margin-top: 1px; }

  .toggle {
    position: relative;
    width: 51px;
    height: 31px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--sep-opaque);
    border-radius: 31px;
    transition: background 0.25s;
    cursor: pointer;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 27px;
    height: 27px;
    left: 2px;
    top: 2px;
    background: white;
    border-radius: 50%;
    transition: transform 0.25s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.20), 0 0.5px 2px rgba(0,0,0,0.12);
  }

  .toggle input:checked + .toggle-slider { background: var(--brand); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* ── CHECKLIST TOGGLE ── */
  .checklist-toggle { align-items: flex-start; padding-top: 12px; padding-bottom: 12px; }
  .checklist-toggle .toggle { margin-top: 3px; }
  .checklist-item-label { flex: 1; padding-right: 12px; font-size: 15px; line-height: 1.4; color: var(--text); }

  /* ── PHOTO UPLOAD ── */
  .photo-section { padding: 14px 16px; }
  .photo-section + .photo-section { border-top: 0.5px solid var(--sep); }

  .photo-upload {
    border: 1.5px dashed var(--sep-opaque);
    border-radius: var(--radius-sm);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
  }

  .photo-upload:active { border-color: var(--brand); background: var(--brand-bg); }

  .photo-upload input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    border: none;
    background: none;
    padding: 0;
  }

  .photo-upload-icon { font-size: 26px; margin-bottom: 5px; line-height: 1; }
  .photo-upload p { font-size: 14px; color: var(--text-2); }
  .photo-upload strong { color: var(--brand); font-weight: 600; }

  .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  .photo-preview img {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 8px;
  }

  /* ── JOB BANNER ── */
  .job-banner {
    background: var(--brand);
    color: white;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
  }

  .job-banner .job-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 3px;
  }

  .job-banner .job-meta {
    font-size: 13px;
    color: rgba(255,255,255,0.80);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .job-banner .job-type-tag {
    display: inline-block;
    background: rgba(255,255,255,0.20);
    color: white;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }

  /* ── CLIENT LIST ── */
  .client-list { display: flex; flex-direction: column; gap: 8px; }
  .client-list-card { margin-bottom: 10px; }

  .client-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }

  .client-item:active { background: var(--bg); }
  .client-item.selected { background: var(--brand-bg); }
  .client-item-info { flex: 1; min-width: 0; }

  .client-item-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .client-item-jobs { font-size: 13px; color: var(--text-3); }

  .client-item-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--sep-opaque);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: transparent;
    font-size: 11px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .client-item.selected .client-item-check {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
  }

  /* ── REVIEW CARD ── */
  .review-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .review-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .review-source {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--brand-bg);
    color: var(--brand);
  }

  .review-date { font-size: 12px; color: var(--text-3); }

  .review-customer {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .review-text {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .review-fields { display: flex; flex-direction: column; gap: 10px; }

  .review-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .review-field input[type="text"],
  .review-field select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--sep-opaque);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .review-save-btn {
    margin-top: 12px;
    width: 100%;
    padding: 11px;
    background: var(--brand);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .review-save-btn:active { opacity: 0.75; }
  .review-save-btn:disabled { opacity: 0.5; }

  .review-saved {
    text-align: center;
    padding: 12px;
    color: #34C759;
    font-size: 14px;
    font-weight: 600;
  }

  /* ── BUTTONS ── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
  }

  .btn:active { opacity: 0.75; transform: scale(0.99); }
  .btn-primary { background: var(--brand); color: white; }
  .btn-secondary { background: none; color: var(--brand); font-weight: 500; padding: 12px 20px; }

  .actions { margin-top: 16px; display: flex; flex-direction: column; gap: 2px; }

  /* ── INCIDENT NOTES ── */
  #incident-notes-field {
    display: none;
    border-top: 0.5px solid var(--sep);
    padding: 4px 16px 12px;
  }

  #incident-notes-field.visible { display: block; }

  #incident-notes-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-3);
    margin: 10px 0 5px;
  }

  #incident-notes-field textarea { padding: 0; min-height: 72px; }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-3);
    font-size: 14px;
    font-weight: 500;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--sep-opaque);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── NO JOBS / ERROR ── */
  .no-jobs {
    text-align: center;
    padding: 32px;
    color: var(--text-3);
    font-size: 15px;
  }

  .error-msg {
    background: rgba(255,59,48,0.10);
    color: #FF3B30;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* ── SUCCESS ── */
  .success-screen {
    text-align: center;
    padding: 56px 24px 40px;
    display: none;
  }

  .success-screen.visible { display: block; animation: fadeIn 0.4s ease; }
  .success-icon { font-size: 64px; margin-bottom: 20px; line-height: 1; }

  .success-screen h2 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .success-screen p {
    color: var(--text-2);
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

</style>
</head>
<body>

<header>
  <img class="header-logo" src="https://www.masterswindowcleaning.com/wp-content/uploads/2023/05/Final-logo.png" alt="Master's Window Cleaning">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Review Linker</p>
  </div>
</header>

<div class="container">

  <div class="error-msg" id="error-msg"></div>

  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    Loading unlinked reviews...
  </div>

  <div id="no-reviews" class="no-jobs" style="display:none">
    🎉 All reviews are linked. Nothing to do!
  </div>

  <div id="review-list" style="display:none"></div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <h2>All Done</h2>
    <p>All reviews have been linked.</p>
    <button class="btn btn-primary" onclick="location.reload()">Check Again</button>
  </div>

</div>

<script>
const AIRTABLE_BASE_ID = 'appVXuyAYj47nZwyz';
const AIRTABLE_PAT = 'pat51Bpz1DmsTICb1.4cc6011c585d7167d45c6214905f55c09fe042e18742b3fdd53f09646cfb00a0';
const REVIEWS_TABLE = 'Reviews';
const EMPLOYEES_TABLE = 'Employees';

const headers = {
  'Authorization': `Bearer ${AIRTABLE_PAT}`,
  'Content-Type': 'application/json'
};

let employees = [];
let pendingReviews = [];

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

async function init() {
  try {
    // Load employees
    const empRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${EMPLOYEES_TABLE}?sort[0][field]=Name&sort[0][direction]=asc`,
      { headers }
    );
    const empData = await empRes.json();
    employees = empData.records.map(r => ({ id: r.id, name: r.fields.Name }));

    // Load unlinked reviews (Linked by Office = false/unchecked)
    const formula = encodeURIComponent(`NOT({Linked by Office})`);
    const revRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${REVIEWS_TABLE}?filterByFormula=${formula}&sort[0][field]=Date&sort[0][direction]=desc`,
      { headers }
    );
    const revData = await revRes.json();
    pendingReviews = revData.records;

    document.getElementById('loading-screen').style.display = 'none';

    if (pendingReviews.length === 0) {
      document.getElementById('no-reviews').style.display = 'block';
      return;
    }

    renderReviews();

  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    showError('Could not load reviews. Check your connection.');
  }
}

function renderReviews() {
  const list = document.getElementById('review-list');
  list.style.display = 'block';
  list.innerHTML = '';

  const heading = document.createElement('p');
  heading.className = 'section-label';
  heading.textContent = `${pendingReviews.length} unlinked review${pendingReviews.length !== 1 ? 's' : ''}`;
  list.appendChild(heading);

  pendingReviews.forEach(review => {
    const f = review.fields;
    const date = f['Date'] ? new Date(f['Date']).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const source = f['Source'] || '';
    const customerName = f['Customer Name'] || '';
    const reviewText = f['Review Text'] || '';
    const sentiment = f['Sentiment'] || '';

    const sentimentColor = sentiment === 'Positive' ? '#34C759' : sentiment === 'Negative' ? '#FF3B30' : '#8E8E93';

    const card = document.createElement('div');
    card.className = 'review-card';
    card.id = `review-${review.id}`;
    card.innerHTML = `
      <div class="review-meta">
        <span class="review-source">${esc(source)}</span>
        <span class="review-date">${esc(date)}</span>
        ${sentiment ? `<span style="font-size:11px;font-weight:600;color:${sentimentColor}">${esc(sentiment)}</span>` : ''}
      </div>
      <div class="review-customer">${esc(customerName)}</div>
      ${reviewText ? `<div class="review-text">"${esc(reviewText)}"</div>` : ''}
      <div class="review-fields">
        <div class="review-field">
          <label>Customer Name (override if needed)</label>
          <input type="text" id="name-${review.id}" value="${esc(customerName)}" placeholder="Customer name in CRM">
        </div>
        <div class="review-field">
          <label>Link to Employee</label>
          <div class="select-wrapper">
            <select id="emp-${review.id}">
              <option value="">— Select employee —</option>
              ${employees.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
      <button class="review-save-btn" onclick="saveReview('${review.id}')">Save & Link</button>
      <div class="review-saved" id="saved-${review.id}" style="display:none">✓ Linked</div>
    `;
    list.appendChild(card);
  });
}

async function saveReview(recordId) {
  const empId = document.getElementById(`emp-${recordId}`).value;
  const customerName = document.getElementById(`name-${recordId}`).value.trim();
  const btn = document.querySelector(`#review-${recordId} .review-save-btn`);

  if (!empId) {
    showError('Please select an employee before saving.');
    return;
  }

  btn.textContent = 'Saving...';
  btn.disabled = true;
  hideError();

  const fields = {
    'Employee': [{ id: empId }],
    'Linked by Office': true
  };

  if (customerName) {
    fields['Customer Name'] = customerName;
  }

  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${REVIEWS_TABLE}/${recordId}`,
      {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ fields })
      }
    );

    if (!res.ok) throw new Error('Save failed');

    // Hide the card, show saved indicator
    document.getElementById(`saved-${recordId}`).style.display = 'block';
    btn.style.display = 'none';

    // Remove from pending
    pendingReviews = pendingReviews.filter(r => r.id !== recordId);

    // Update count label
    const heading = document.querySelector('.section-label');
    if (heading) {
      heading.textContent = `${pendingReviews.length} unlinked review${pendingReviews.length !== 1 ? 's' : ''}`;
    }

    // If all done, show success
    if (pendingReviews.length === 0) {
      setTimeout(() => {
        document.getElementById('review-list').style.display = 'none';
        document.getElementById('success-screen').classList.add('visible');
      }, 800);
    }

  } catch(e) {
    showError('Save failed. Please try again.');
    btn.textContent = 'Save & Link';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
  window.scrollTo(0, 0);
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

init();
</script>
</body>
</html>
