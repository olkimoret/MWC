<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Review Linker</title>
<link rel="stylesheet" href="/mwc.css">
</head>
<body>

<header>
  <img class="header-logo" src="https://www.masterswindowcleaning.com/wp-content/uploads/2023/05/Final-logo.png" alt="Master's Window Cleaning">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Review Linker</p>
  </div>
</header>

<div class="container">

  <div class="error-msg" id="error-msg"></div>

  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    Loading unlinked reviews...
  </div>

  <div id="no-reviews" class="no-jobs" style="display:none">
    🎉 All reviews are linked. Nothing to do!
  </div>

  <div id="review-list" style="display:none"></div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <h2>All Done</h2>
    <p>All reviews have been linked.</p>
    <button class="btn btn-primary" onclick="location.reload()">Check Again</button>
  </div>

</div>

<script>
const AIRTABLE_BASE_ID = 'appVXuyAYj47nZwyz';
const AIRTABLE_PAT = 'pat51Bpz1DmsTICb1.4cc6011c585d7167d45c6214905f55c09fe042e18742b3fdd53f09646cfb00a0';
const REVIEWS_TABLE = 'Reviews';
const EMPLOYEES_TABLE = 'Employees';

const headers = {
  'Authorization': `Bearer ${AIRTABLE_PAT}`,
  'Content-Type': 'application/json'
};

let employees = [];
let pendingReviews = [];

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

async function init() {
  try {
    // Load employees
    const empRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${EMPLOYEES_TABLE}?sort[0][field]=Name&sort[0][direction]=asc`,
      { headers }
    );
    const empData = await empRes.json();
    employees = empData.records.map(r => ({ id: r.id, name: r.fields.Name }));

    // Load unlinked reviews (Linked by Office = false/unchecked)
    const formula = encodeURIComponent(`NOT({Linked by Office})`);
    const revRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${REVIEWS_TABLE}?filterByFormula=${formula}&sort[0][field]=Date&sort[0][direction]=desc`,
      { headers }
    );
    const revData = await revRes.json();
    pendingReviews = revData.records;

    document.getElementById('loading-screen').style.display = 'none';

    if (pendingReviews.length === 0) {
      document.getElementById('no-reviews').style.display = 'block';
      return;
    }

    renderReviews();

  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    showError('Could not load reviews. Check your connection.');
  }
}

function renderReviews() {
  const list = document.getElementById('review-list');
  list.style.display = 'block';
  list.innerHTML = '';

  const heading = document.createElement('p');
  heading.className = 'section-label';
  heading.textContent = `${pendingReviews.length} unlinked review${pendingReviews.length !== 1 ? 's' : ''}`;
  list.appendChild(heading);

  pendingReviews.forEach(review => {
    const f = review.fields;
    const date = f['Date'] ? new Date(f['Date']).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const source = f['Source'] || '';
    const customerName = f['Customer Name'] || '';
    const reviewText = f['Review Text'] || '';
    const sentiment = f['Sentiment'] || '';

    const sentimentColor = sentiment === 'Positive' ? '#34C759' : sentiment === 'Negative' ? '#FF3B30' : '#8E8E93';

    const card = document.createElement('div');
    card.className = 'review-card';
    card.id = `review-${review.id}`;
    card.innerHTML = `
      <div class="review-meta">
        <span class="review-source">${esc(source)}</span>
        <span class="review-date">${esc(date)}</span>
        ${sentiment ? `<span style="font-size:11px;font-weight:600;color:${sentimentColor}">${esc(sentiment)}</span>` : ''}
      </div>
      <div class="review-customer">${esc(customerName)}</div>
      ${reviewText ? `<div class="review-text">"${esc(reviewText)}"</div>` : ''}
      <div class="review-fields">
        <div class="review-field">
          <label>Customer Name (override if needed)</label>
          <input type="text" id="name-${review.id}" value="${esc(customerName)}" placeholder="Customer name in CRM">
        </div>
        <div class="review-field">
          <label>Link to Employee</label>
          <div class="select-wrapper">
            <select id="emp-${review.id}">
              <option value="">— Select employee —</option>
              ${employees.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
      <button class="review-save-btn" onclick="saveReview('${review.id}')">Save & Link</button>
      <div class="review-saved" id="saved-${review.id}" style="display:none">✓ Linked</div>
    `;
    list.appendChild(card);
  });
}

async function saveReview(recordId) {
  const empId = document.getElementById(`emp-${recordId}`).value;
  const customerName = document.getElementById(`name-${recordId}`).value.trim();
  const btn = document.querySelector(`#review-${recordId} .review-save-btn`);

  if (!empId) {
    showError('Please select an employee before saving.');
    return;
  }

  btn.textContent = 'Saving...';
  btn.disabled = true;
  hideError();

  const fields = {
    'Employee': [{ id: String(empId) }],
    'Linked by Office': true
  };

  if (customerName) {
    fields['Customer Name'] = customerName;
  }

  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${REVIEWS_TABLE}/${recordId}`,
      {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ fields })
      }
    );

    if (!res.ok) throw new Error('Save failed');

    // Hide the card, show saved indicator
    document.getElementById(`saved-${recordId}`).style.display = 'block';
    btn.style.display = 'none';

    // Remove from pending
    pendingReviews = pendingReviews.filter(r => r.id !== recordId);

    // Update count label
    const heading = document.querySelector('.section-label');
    if (heading) {
      heading.textContent = `${pendingReviews.length} unlinked review${pendingReviews.length !== 1 ? 's' : ''}`;
    }

    // If all done, show success
    if (pendingReviews.length === 0) {
      setTimeout(() => {
        document.getElementById('review-list').style.display = 'none';
        document.getElementById('success-screen').classList.add('visible');
      }, 800);
    }

  } catch(e) {
    showError('Save failed. Please try again.');
    btn.textContent = 'Save & Link';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
  window.scrollTo(0, 0);
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

init();
</script>
</body>
</html>
