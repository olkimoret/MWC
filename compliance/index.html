<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Compliance Report</title>
<link rel="stylesheet" href="/mwc-new.css">
<style>
.compliance-container {
  margin: 0 auto;
  padding: 24px 16px 72px;
  max-width: 1200px;
}

@media (min-width: 641px) {
  .compliance-container {
    padding: 36px 32px 80px;
  }
}

.compliance-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
}

.compliance-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 4px 0;
}

.compliance-subtitle {
  font-size: 14px;
  color: var(--text-2);
  margin: 0;
}

.print-button {
  background: rgba(255,255,255,0.08);
  border: none;
  color: rgba(255,255,255,0.80);
  padding: 0 14px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.print-button:hover {
  background: rgba(255,255,255,0.13);
  color: #fff;
}

.section-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
  margin-bottom: 24px;
  background: var(--surface);
}

.section-card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 20px 0;
}

.all-clear {
  padding: 20px;
  background: rgba(22, 163, 74, 0.08);
  border: 1px solid rgba(22, 163, 74, 0.2);
  border-radius: var(--radius-sm);
  color: var(--success);
  font-weight: 600;
  font-size: 14px;
  text-align: center;
}

.compliance-table {
  width: 100%;
  border-collapse: collapse;
  margin: 0;
}

.compliance-table th {
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.compliance-table td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text);
}

.compliance-table tbody tr:last-child td {
  border-bottom: none;
}

.status-check {
  color: var(--success);
  font-weight: 700;
  font-size: 16px;
}

.status-cross {
  color: var(--error);
  font-weight: 700;
  font-size: 16px;
}

.badge-partial {
  display: inline-block;
  background: rgba(217, 119, 6, 0.10);
  color: var(--amber);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.badge-no {
  display: inline-block;
  background: rgba(220, 38, 38, 0.10);
  color: var(--error);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.missing-items {
  color: var(--text-2);
  font-size: 13px;
}

@media print {
  header,
  .print-button,
  .compliance-header {
    display: none;
  }

  body {
    background: white;
  }

  .compliance-container {
    padding: 0;
    max-width: 100%;
  }

  .section-card {
    page-break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ccc;
  }

  .compliance-table {
    page-break-inside: avoid;
  }
}
</style>
</head>
<body>
<script>
  (function() {
    const PASSWORD = 'mwc2026';
    const AUTH_KEY = 'mwc_manager_auth';
    if (localStorage.getItem(AUTH_KEY) !== PASSWORD) {
      const entered = prompt('Manager access — enter password:');
      if (entered === PASSWORD) {
        localStorage.setItem(AUTH_KEY, PASSWORD);
      } else {
        window.location.replace('/jobs/index.html');
      }
    }
  })();
</script>

<header>
  <img class="header-lion" src="/assets/lion.png" alt="Lion">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Compliance Report</p>
  </div>
  <a class="header-back" href="/index.html" title="Back to dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
    Dashboard
  </a>
</header>

<div class="compliance-container">
  <div class="compliance-header">
    <div>
      <h1 class="compliance-title">Compliance Report</h1>
      <p class="compliance-subtitle">Last 2 pay periods</p>
    </div>
    <button class="print-button" onclick="window.print()">Print</button>
  </div>

  <div id="loading" class="loading" style="text-align: center; padding: 40px;">
    <div class="spinner" style="margin: 0 auto 16px;"></div>
    <p>Loading compliance data…</p>
  </div>

  <div id="content" style="display: none;">
    <!-- OSHA Assessment Completion -->
    <div class="section-card">
      <h2 class="section-card-title">OSHA Job Hazard Assessments</h2>
      <div id="osha-table"></div>
    </div>

    <!-- Checklist Issues -->
    <div class="section-card">
      <h2 class="section-card-title">Checklist Issues</h2>
      <div id="checklist-table"></div>
    </div>
  </div>
</div>

<script>
const AIRTABLE_BASE_ID = 'appVXuyAYj47nZwyz';
const AIRTABLE_PAT = 'pat51Bpz1DmsTICb1.4cc6011c585d7167d45c6214905f55c09fe042e18742b3fdd53f09646cfb00a0';

const headers = {
  'Authorization': `Bearer ${AIRTABLE_PAT}`,
  'Content-Type': 'application/json'
};

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

const OSHA_REQUIRED_JOB_TYPES = new Set([
  'Residential Gutter Cleaning',
  'Commercial Gutter Cleaning',
  'Roof Cleaning',
  'Partial Roof Cleaning',
  'Skylight Cleaning'
]);

async function init() {
  try {
    const today = todayLocal();

    // Fetch pay periods
    const ppRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Pay%20Periods?sort[0][field]=End%20Date&sort[0][direction]=desc&fields[]=Pay%20Period%20Name&fields[]=Start%20Date&fields[]=End%20Date`,
      { headers }
    );
    const ppData = await ppRes.json();
    const payPeriods = ppData.records
      .filter(p => p.fields['End Date'] && p.fields['End Date'] < today)
      .slice(0, 2);

    if (payPeriods.length === 0) {
      document.getElementById('loading').innerHTML = '<p style="color: var(--text-2);">No completed pay periods found.</p>';
      return;
    }

    const startDate = payPeriods[payPeriods.length - 1].fields['Start Date'];
    const endDate = payPeriods[0].fields['End Date'];

    // Fetch jobs for both periods
    const formula = encodeURIComponent(
      `AND(DATESTR({Job Date})>='${startDate}',DATESTR({Job Date})<='${endDate}')`
    );
    const jobsRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Jobs?filterByFormula=${formula}&fields[]=Job%20Date&fields[]=Customer%20Name&fields[]=Job%20Type&fields[]=Employee&fields[]=OSHA%20Skylights&fields[]=OSHA%20Solar%20Panels&fields[]=OSHA%20Tripping%20Hazards&fields[]=OSHA%20Electrical%20Wires&fields[]=OSHA%20Broken%20Tiles&fields[]=OSHA%20Moss%20Lichen&fields[]=OSHA%20Windy&fields[]=OSHA%20Rainy&fields[]=OSHA%20Cloudy&fields[]=OSHA%20Extreme%20Heat&fields[]=OSHA%20Hazards%20Identified&fields[]=OSHA%20Other%20Hazards&fields[]=OSHA%20Precautions&fields[]=Checklist%20Completed&fields[]=Checklist%20Missing`,
      { headers }
    );
    const jobsData = await jobsRes.json();
    const allJobs = jobsData.records || [];

    // Fetch employees
    const empRes = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Employees?fields[]=Name`,
      { headers }
    );
    const empData = await empRes.json();
    const employees = Object.fromEntries(
      (empData.records || []).map(r => [r.id, r.fields.Name])
    );

    // Filter jobs by type (exclude Discount and Non-Commission)
    const relevantJobs = allJobs.filter(j => {
      const jobType = j.fields['Job Type'] || '';
      return jobType !== 'Discount' && jobType !== 'Non-Commission';
    });

    // OSHA Assessment Completion: filter for OSHA-required job types
    const oshaJobs = relevantJobs.filter(j => {
      const jobType = j.fields['Job Type'] || '';
      return OSHA_REQUIRED_JOB_TYPES.has(jobType);
    }).sort((a, b) => {
      const dateA = new Date(a.fields['Job Date'] || '');
      const dateB = new Date(b.fields['Job Date'] || '');
      return dateB - dateA;
    });

    // Checklist Issues: filter for Partial or No
    const checklistIssues = relevantJobs.filter(j => {
      const completed = j.fields['Checklist Completed'] || '';
      return completed === 'Partial' || completed === 'No';
    }).sort((a, b) => {
      const dateA = new Date(a.fields['Job Date'] || '');
      const dateB = new Date(b.fields['Job Date'] || '');
      return dateB - dateA;
    });

    // Render OSHA table
    const oshaDiv = document.getElementById('osha-table');
    if (oshaJobs.length === 0) {
      oshaDiv.innerHTML = '<div class="all-clear">✅ All clear for this period</div>';
    } else {
      let html = '<table class="compliance-table"><thead><tr>';
      html += '<th>Date</th><th>Employee</th><th>Customer</th><th>Job Type</th><th>OSHA Completed</th>';
      html += '</tr></thead><tbody>';
      oshaJobs.forEach(j => {
        const date = j.fields['Job Date'] || '';
        const empName = employees[(j.fields['Employee'] || [])[0]] || 'Unknown';
        const customer = j.fields['Customer Name'] || 'Unknown';
        const jobType = j.fields['Job Type'] || '';
        const precautions = j.fields['OSHA Precautions'] || '';
        const status = precautions ? '<span class="status-check">✓</span>' : '<span class="status-cross">✗</span>';
        html += `<tr><td>${esc(date)}</td><td>${esc(empName)}</td><td>${esc(customer)}</td><td>${esc(jobType)}</td><td>${status}</td></tr>`;
      });
      html += '</tbody></table>';
      oshaDiv.innerHTML = html;
    }

    // Render Checklist table
    const checklistDiv = document.getElementById('checklist-table');
    if (checklistIssues.length === 0) {
      checklistDiv.innerHTML = '<div class="all-clear">✅ All clear for this period</div>';
    } else {
      let html = '<table class="compliance-table"><thead><tr>';
      html += '<th>Date</th><th>Employee</th><th>Customer</th><th>Job Type</th><th>Status</th><th>Missing Items</th>';
      html += '</tr></thead><tbody>';
      checklistIssues.forEach(j => {
        const date = j.fields['Job Date'] || '';
        const empName = employees[(j.fields['Employee'] || [])[0]] || 'Unknown';
        const customer = j.fields['Customer Name'] || 'Unknown';
        const jobType = j.fields['Job Type'] || '';
        const completed = j.fields['Checklist Completed'] || '';
        const missing = j.fields['Checklist Missing'] || '';
        const badgeClass = completed === 'Partial' ? 'badge-partial' : 'badge-no';
        const badge = `<span class="${badgeClass}">${esc(completed)}</span>`;
        const missingText = missing ? esc(missing) : '—';
        html += `<tr><td>${esc(date)}</td><td>${esc(empName)}</td><td>${esc(customer)}</td><td>${esc(jobType)}</td><td>${badge}</td><td class="missing-items">${missingText}</td></tr>`;
      });
      html += '</tbody></table>';
      checklistDiv.innerHTML = html;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (e) {
    console.error(e);
    document.getElementById('loading').innerHTML = '<p style="color: var(--error);">Failed to load compliance data. Please check your connection.</p>';
  }
}

init();
</script>
<script src="/custom-select.js"></script>
</body>
</html>
