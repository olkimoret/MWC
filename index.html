<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Manager Dashboard</title>
<style>
  :root {
    --brand:      #C0392B;
    --brand-bg:   rgba(192,57,43,0.08);
    --text:       #1C1C1E;
    --text-2:     #6C6C70;
    --text-3:     #8E8E93;
    --sep-opaque: #D1D1D6;
    --bg:         #F2F2F7;
    --surface:    #FFFFFF;
    --radius:     14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: #a10000;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo { height: 44px; width: auto; object-fit: contain; flex-shrink: 0; }

  .header-text h1 { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .header-text p  { font-size: 12px; color: rgba(255,255,255,0.70); margin-top: 1px; }

  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  .greeting {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }

  .date-label {
    font-size: 14px;
    color: var(--text-3);
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 0 4px 10px;
  }

  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .dash-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, transform 0.1s;
    border: none;
    width: 100%;
    text-align: left;
  }

  .dash-card:active { background: var(--brand-bg); transform: scale(0.99); }

  .dash-icon {
    width: 48px;
    height: 48px;
    background: var(--brand-bg);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .dash-info { flex: 1; min-width: 0; }

  .dash-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .dash-sub {
    font-size: 13px;
    color: var(--text-3);
  }

  .dash-sub.alert { color: var(--brand); font-weight: 500; }

  .dash-arrow {
    font-size: 18px;
    color: var(--sep-opaque);
    flex-shrink: 0;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--sep-opaque);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <img class="header-logo" src="https://www.masterswindowcleaning.com/wp-content/uploads/2023/05/Final-logo.png" alt="Master's Window Cleaning">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Manager Dashboard</p>
  </div>
</header>

<div class="container">

  <div class="greeting" id="greeting">Good morning</div>
  <div class="date-label" id="date-label"></div>

  <p class="section-label">Actions</p>
  <div class="cards">

    <a class="dash-card" href="/reviews/">
      <div class="dash-icon">📋</div>
      <div class="dash-info">
        <div class="dash-title">Link Reviews</div>
        <div class="dash-sub" id="review-count"><span class="spinner"></span> Loading...</div>
      </div>
      <div class="dash-arrow">›</div>
    </a>

    <a class="dash-card" href="/manager/">
      <div class="dash-icon">🕐</div>
      <div class="dash-info">
        <div class="dash-title">Log Arrival Times</div>
        <div class="dash-sub" id="today-label"></div>
      </div>
      <div class="dash-arrow">›</div>
    </a>

    <a class="dash-card" href="https://airtable.com/appVXuyAYj47nZwyz/pagpmDIMyFnPi8ftK" target="_blank">
      <div class="dash-icon">📊</div>
      <div class="dash-info">
        <div class="dash-title">Employee Dashboard</div>
        <div class="dash-sub">Performance & scores in Airtable</div>
      </div>
      <div class="dash-arrow">›</div>
    </a>

  </div>

</div>

<script>
const AIRTABLE_BASE_ID = 'appVXuyAYj47nZwyz';
const AIRTABLE_PAT = 'pat51Bpz1DmsTICb1.4cc6011c585d7167d45c6214905f55c09fe042e18742b3fdd53f09646cfb00a0';

// Greeting and date
const now = new Date();
const hour = now.getHours();
const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
document.getElementById('greeting').textContent = greeting;
document.getElementById('date-label').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
document.getElementById('today-label').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

// Load unlinked review count
async function loadReviewCount() {
  try {
    const formula = encodeURIComponent(`NOT({Linked by Office})`);
    const res = await fetch(
      `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Reviews?filterByFormula=${formula}&fields[]=Date`,
      { headers: { 'Authorization': `Bearer ${AIRTABLE_PAT}` } }
    );
    const data = await res.json();
    const count = data.records.length;
    const el = document.getElementById('review-count');
    if (count === 0) {
      el.textContent = 'All reviews linked ✓';
    } else {
      el.textContent = `${count} unlinked review${count !== 1 ? 's' : ''} waiting`;
      el.classList.add('alert');
    }
  } catch(e) {
    document.getElementById('review-count').textContent = 'Tap to view reviews';
  }
}

loadReviewCount();
</script>
</body>
</html>
