<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Arrival Times</title>
<link rel="stylesheet" href="/mwc-new.css">
<link rel="stylesheet" href="/custom-select.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
.flatpickr-input { cursor: pointer; }
.flatpickr-calendar {
  font-family: 'Plus Jakarta Sans', sans-serif;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.14);
  border: 1px solid #E5E7EB;
}
.flatpickr-day.selected,
.flatpickr-day.selected:hover { background: #111827; border-color: #111827; }
.flatpickr-day:hover { background: #F3F4F6; }
.flatpickr-months { background: #111827; border-radius: 14px 14px 0 0; }
.flatpickr-months .flatpickr-month { background: transparent; }
.flatpickr-current-month { padding: 10px 0; font-size: 14px; }
.flatpickr-current-month .flatpickr-monthDropdown-months {
  background: transparent;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  -webkit-appearance: none;
  appearance: none;
}
.flatpickr-current-month .flatpickr-monthDropdown-months option {
  background: #1F2937;
  color: #fff;
}
.flatpickr-current-month input.cur-year {
  color: #fff;

}
.flatpickr-months .flatpickr-prev-month,
.flatpickr-months .flatpickr-next-month { color: #fff; fill: #fff; padding: 10px; }
.flatpickr-weekday { color: #9CA3AF; font-weight: 600; font-size: 11px; }

.numInputWrapper span svg { fill: #fff; }
.flatpickr-time input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 600; }
</style>
</head>
<body>
<script>
  (function() {
    const PASSWORD = 'mwc2026';
    const AUTH_KEY = 'mwc_manager_auth';
    if (localStorage.getItem(AUTH_KEY) !== PASSWORD) {
      const entered = prompt('Manager access — enter password:');
      if (entered === PASSWORD) {
        localStorage.setItem(AUTH_KEY, PASSWORD);
      } else {
        window.location.replace('/jobs/index.html');
      }
    }
  })();
</script>
<header>
  <img class="header-lion" src="/assets/lion.png" alt="Lion">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Arrival Times</p>
  </div>
  <a class="header-back" href="/index.html" title="Back to dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
    Dashboard
  </a>
</header>

<div class="container-wide">

  <div class="error-msg" id="error-msg"></div>

  <!-- Date picker card -->
  <div style="max-width:320px; margin-bottom:28px;">
    <div class="card" style="margin-bottom:0">
      <div class="form-row" style="border-bottom: none">
        <span class="row-label">Date</span>
        <input type="text" id="date-picker" placeholder="Select date" readonly style="cursor:pointer;flex:1;text-align:right;font-family:inherit;font-size:15px;font-weight:500;color:var(--amber);border:none;background:transparent;outline:none;">
      </div>
    </div>
  </div>

  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    Loading employees…
  </div>

  <div id="no-employees" class="no-jobs" style="display:none">
    No scheduled employees for this date.
  </div>

  <div id="employee-list" class="employee-grid" style="display:none"></div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
    </div>
    <h2>Saved</h2>
    <p>Arrival times have been recorded.</p>
    <button class="btn btn-primary" style="max-width:240px;margin:0 auto;" onclick="resetSuccess()">Done</button>
  </div>

</div>

<!-- Sticky save bar -->
<div class="save-bar" id="save-bar" style="display:none">
  <button class="btn btn-primary" id="save-btn" onclick="saveAll()">Save All</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
const AIRTABLE_BASE_ID = 'appVXuyAYj47nZwyz';
const AIRTABLE_PAT = 'pat51Bpz1DmsTICb1.4cc6011c585d7167d45c6214905f55c09fe042e18742b3fdd53f09646cfb00a0';

const headers = {
  'Authorization': `Bearer ${AIRTABLE_PAT}`,
  'Content-Type': 'application/json'
};

let employeeMap = {};
let currentEmployeeIds = [];
let existingScores = {};

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function to12h(val) {
  if (!val) return '';
  const [h, m] = val.split(':').map(Number);
  const period = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

function to24h(str) {
  if (!str) return '';
  const match = str.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
  if (!match) return '';
  let h = parseInt(match[1]);
  const m = match[2];
  const period = match[3].toUpperCase();
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${m}`;
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

async function loadForDate(dateStr) {
  document.getElementById('loading-screen').style.display = '';
  document.getElementById('no-employees').style.display = 'none';
  document.getElementById('employee-list').style.display = 'none';
  document.getElementById('save-bar').style.display = 'none';
  document.getElementById('success-screen').classList.remove('visible');
  hideError();

  try {
    const jobFormula = encodeURIComponent(`AND(DATESTR({Job Date})='${dateStr}',NOT({Job Type}='Discount'))`);
    const scoreFormula = encodeURIComponent(`DATESTR({Date})='${dateStr}'`);

    const [empData, jobData, scoreData] = await Promise.all([
      fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Employees?sort[0][field]=Name&sort[0][direction]=asc`, { headers }).then(r => r.json()),
      fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Jobs?filterByFormula=${jobFormula}&fields[]=Employee`, { headers }).then(r => r.json()),
      fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Monthly%20Scores?filterByFormula=${scoreFormula}`, { headers }).then(r => r.json())
    ]);

    employeeMap = {};
    empData.records.forEach(r => { employeeMap[r.id] = r.fields.Name; });

    const empSet = new Set();
    jobData.records.forEach(r => {
      const emps = r.fields['Employee'];
      if (Array.isArray(emps)) emps.forEach(id => empSet.add(id));
    });
    currentEmployeeIds = [...empSet]
      .filter(id => employeeMap[id])
      .sort((a, b) => (employeeMap[a] || '').localeCompare(employeeMap[b] || ''));

    existingScores = {};
    scoreData.records.forEach(r => {
      const emps = r.fields['Employee'];
      if (Array.isArray(emps)) emps.forEach(id => { existingScores[id] = r; });
    });

    document.getElementById('loading-screen').style.display = 'none';

    if (currentEmployeeIds.length === 0) {
      document.getElementById('no-employees').style.display = 'block';
      return;
    }

    renderEmployees();
    document.getElementById('employee-list').style.display = 'grid';
    document.getElementById('save-bar').style.display = 'block';

  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    showError('Could not load data. Check your connection.');
  }
}

function renderEmployees() {
  const list = document.getElementById('employee-list');
  list.innerHTML = '';

  currentEmployeeIds.forEach(empId => {
    const name = employeeMap[empId];
    const score = existingScores[empId];
    const existingTime = score ? score.fields['Arrival Time'] || '' : '';
    const excusedLate = score ? (score.fields['Excused Late'] || false) : false;
    const callOut = score ? (score.fields['Call Out'] || false) : false;

    const card = document.createElement('div');
    card.className = 'emp-card';
    card.id = `emp-${empId}`;
    card.innerHTML = `
      <div class="emp-card-header">
        <div class="emp-avatar">${initials(name)}</div>
        <div class="emp-name">${name}</div>
      </div>
      <div class="emp-card-body">
        <div class="form-row">
          <span class="row-label">Arrival Time</span>
          <input type="text" id="time-${empId}" class="fp-time" placeholder="Set time…" readonly data-default="${existingTime ? existingTime.split(' ')[0].replace(/^(\d)/, '0$1') : ''}">
        </div>
        <div class="toggle-field">
          <div>
            <div class="toggle-label">Excused Late</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="excused-${empId}" ${excusedLate ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-field" style="border-bottom:none">
          <div>
            <div class="toggle-label">Call Out</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="callout-${empId}" ${callOut ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  window.initTimePickers(list);
}

async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;
  hideError();

  const dateStr = document.getElementById('date-picker').value;
  let failed = 0;

  for (const empId of currentEmployeeIds) {
    const timeVal = document.getElementById(`time-${empId}`).dataset.h24 || '';
    const excusedLate = document.getElementById(`excused-${empId}`).checked;
    const callOut = document.getElementById(`callout-${empId}`).checked;

    const fields = {
      'Arrival Time': timeVal ? to12h(timeVal) : null,
      'Excused Late': excusedLate,
      'Call Out': callOut
    };

    // Remove null fields
    Object.keys(fields).forEach(k => fields[k] === null && delete fields[k]);

    const existing = existingScores[empId];

    try {
      if (existing) {
        const res = await fetch(
          `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Monthly%20Scores/${existing.id}`,
          { method: 'PATCH', headers, body: JSON.stringify({ fields }) }
        );
        if (!res.ok) throw new Error();
      } else {
        fields['Employee'] = [empId];
        fields['Date'] = dateStr;
        const res = await fetch(
          `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Monthly%20Scores`,
          { method: 'POST', headers, body: JSON.stringify({ fields }) }
        );
        if (!res.ok) throw new Error();
      }
    } catch(e) {
      failed++;
    }
  }

  btn.textContent = 'Save All';
  btn.disabled = false;

  if (failed > 0) {
    showError(`${failed} record${failed !== 1 ? 's' : ''} failed to save. Please try again.`);
  } else {
    document.getElementById('employee-list').style.display = 'none';
    document.getElementById('save-bar').style.display = 'none';
    document.getElementById('success-screen').classList.add('visible');
  }
}

function resetSuccess() {
  document.getElementById('success-screen').classList.remove('visible');
  loadForDate(document.getElementById('date-picker').value);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
  window.scrollTo(0, 0);
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

// Init date picker with Flatpickr
flatpickr('#date-picker', {
  dateFormat: 'Y-m-d',
  defaultDate: todayLocal(),
  onChange: (selectedDates, dateStr) => loadForDate(dateStr)
});

loadForDate(todayLocal());
</script>
<script src="/timepicker.js"></script>
<script src="/custom-select.js"></script>
</body>
</html>
