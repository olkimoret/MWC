<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master's Window Cleaning — Run Payroll</title>
<link rel="stylesheet" href="/mwc-new.css">
<link rel="stylesheet" href="/custom-select.css">
<style>
/* Payroll table */
.team-table {
  width: 100%;
  border-collapse: collapse;
  margin: 0;
}

.team-table th {
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.team-table td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.team-table tbody tr {
  cursor: pointer;
  transition: background 0.15s;
}

.team-table tbody tr:hover {
  background: var(--bg);
}

.team-table .col-name {
  font-weight: 600;
  color: var(--text);
}

.team-table .col-amount {
  text-align: right;
  font-weight: 600;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
}

.team-table .col-hours {
  text-align: right;
  color: var(--text-2);
  font-size: 13px;
  font-family: 'Courier New', monospace;
}

.team-table .col-status {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
}

.team-table .status-ok {
  color: var(--success);
}

.team-table .status-missing {
  color: var(--error);
}

.team-header {
  padding: 0 0 20px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}

.team-header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 4px 0;
}

.team-header-dates {
  font-size: 13px;
  color: var(--text-2);
  margin: 0;
}

.team-table-wrap {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.team-total {
  text-align: right;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  padding: 16px 0;
  border-top: 2px solid var(--border);
}

.badge-safety {
  display: inline-block;
  background: var(--amber-bg);
  color: var(--amber);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* Payroll cards (employee detail view) */
.payroll-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.payroll-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, transform 0.2s;
  position: relative;
}

.payroll-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.payroll-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.payroll-card-edit-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--text-2);
  transition: color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.payroll-card-edit-btn:hover {
  color: var(--text);
}

.payroll-card-period {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  margin: 0 0 8px 0;
}

.payroll-card-amount {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin: 0 0 12px 0;
  font-family: 'Courier New', monospace;
}

.payroll-card-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-2);
  margin: 8px 0;
}

.payroll-card-row-label {
  font-weight: 500;
}

.payroll-card-row-value {
  text-align: right;
  font-family: 'Courier New', monospace;
  font-weight: 600;
  color: var(--text);
}

.payroll-card-path {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.payroll-card-delta {
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
}

.delta-up {
  color: var(--success);
}

.delta-down {
  color: var(--error);
}

/* Confirmation dialog overlay */
#confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

#confirm-dialog {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
}

#confirm-msg {
  font-size: 15px;
  color: var(--text);
  margin: 0 0 20px 0;
  line-height: 1.5;
}

#confirm-dialog .actions {
  gap: 12px;
}

/* Back button */
.btn-back {
  background: none;
  border: none;
  color: var(--text-2);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  padding: 0 0 20px 0;
  transition: color 0.2s;
}

.btn-back:hover {
  color: var(--text);
}

/* Empty states */
.no-jobs {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-2);
  font-size: 15px;
}

/* Header styling - uses mwc-new.css styles */
.header-back svg {
  width: 18px;
  height: 18px;
  stroke-width: 2;
}

/* Section heading */
.section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 16px 0;
}

/* Actions button group */
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

.actions .btn {
  width: 100%;
}
</style>
</head>
<body>
<script>
  (function() {
    const PASSWORD = 'mwc2026';
    const AUTH_KEY = 'mwc_manager_auth';
    if (localStorage.getItem(AUTH_KEY) !== PASSWORD) {
      const entered = prompt('Manager access — enter password:');
      if (entered === PASSWORD) {
        localStorage.setItem(AUTH_KEY, PASSWORD);
      } else {
        window.location.replace('/jobs/index.html');
      }
    }
  })();
</script>
<header>
  <img class="header-lion" src="/assets/lion.png" alt="Lion">
  <div class="header-text">
    <h1>Master's Window Cleaning</h1>
    <p>Run Payroll</p>
  </div>
  <a class="header-back" href="/index.html" title="Back to dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
    Dashboard
  </a>
</header>

<div class="container-wide">

  <div class="error-msg" id="error-msg"></div>

  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    Loading payroll data…
  </div>

  <!-- TEAM VIEW (default) -->
  <div id="team-view">
    <div class="team-header">
      <h2 class="team-header-title" id="period-name"></h2>
      <p class="team-header-dates" id="period-dates"></p>
    </div>

    <div class="team-table-wrap">
      <table class="team-table">
        <thead>
          <tr>
            <th>Employee</th>
            <th>Gross Wages</th>
            <th>Regular</th>
            <th>OT</th>
            <th></th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="team-tbody"></tbody>
      </table>
    </div>

    <div class="team-total">
      Total: <span id="total-wages">$0.00</span>
    </div>
  </div>

  <!-- EMPLOYEE VIEW -->
  <div id="employee-view" style="display: none">
    <button class="btn-back" onclick="showTeam()">← All Employees</button>
    <h2 id="emp-name-heading"></h2>

    <p class="section-title">Last 4 Payroll Records</p>
    <div class="payroll-cards-grid" id="payroll-cards"></div>

    <div id="no-payroll" class="no-jobs" style="display: none">
      No payroll calculated yet for this employee.
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="showCalculate()">Calculate Payroll</button>
    </div>
  </div>

  <!-- CALCULATE VIEW -->
  <div id="calculate-view" style="display: none">
    <button class="btn-back" onclick="showEmployee()">← Back</button>
    <h2>Calculate Payroll</h2>
    <p id="calc-emp-label" style="color: var(--text-2); margin: 0 0 20px 0;"></p>

    <div class="card" style="margin-bottom: 20px">
      <div class="form-row">
        <span class="row-label">Pay Period</span>
        <div class="select-wrapper" style="position: relative">
          <select id="calc-period-select" style="padding: 10px 32px 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text); background: var(--bg); width: 100%; -webkit-appearance: none; appearance: none; outline: none;">
            <option value="">— Select pay period —</option>
          </select>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="calc-btn" onclick="runCalculate()">Calculate</button>
      <button class="btn btn-secondary" onclick="showEmployee()">Cancel</button>
    </div>

    <div id="calc-loading" style="display: none; text-align: center; padding: 40px 20px; margin-top: 20px;">
      <div class="spinner"></div>
      <p style="color: var(--text-2); margin-top: 16px;">Calculating payroll…</p>
    </div>
  </div>

</div>

<!-- CONFIRMATION DIALOG OVERLAY -->
<div id="confirm-overlay" style="display: none">
  <div id="confirm-dialog">
    <p id="confirm-msg"></p>
    <div class="actions">
      <button class="btn btn-primary" id="confirm-yes">Recalculate & Overwrite</button>
      <button class="btn btn-secondary" id="confirm-no">Cancel</button>
    </div>
  </div>
</div>

<script src="/payroll/payroll.js"></script>
<script src="/custom-select.js"></script>
</body>
</html>
